version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost
      - NODE_ENV=production
      - DB_PATH=./db/uno.db
    volumes:
      - uno-data:/app/db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SOCKET_URL: http://localhost:3001
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uno-data:
